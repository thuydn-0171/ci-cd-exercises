name: unit-test-advance
on:
  workflow_dispatch:
jobs:
  run-unitest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: use node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: exercise-02-basic-testing/package-lock.json
      - run: npm ci
        working-directory: exercise-02-basic-testing
      - run: npm run build --if-present
        working-directory: exercise-02-basic-testing
      - run: npm test
        working-directory: exercise-02-basic-testing
      - name: Run Linting
        run: npx eslint .
        working-directory: exercise-02-basic-testing

